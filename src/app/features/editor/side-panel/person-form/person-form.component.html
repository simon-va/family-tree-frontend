<div class="person-form">
  <div class="person-form__field">
    <label for="firstName">Vorname <span class="required">*</span></label>
    <input
      id="firstName"
      pInputText
      [ngModel]="firstName()"
      (ngModelChange)="firstName.set($event)"
      [disabled]="saving()"
    />
  </div>

  <div class="person-form__field">
    <label for="lastName">Nachname <span class="required">*</span></label>
    <input
      id="lastName"
      pInputText
      [ngModel]="lastName()"
      (ngModelChange)="lastName.set($event)"
      [disabled]="saving()"
    />
  </div>

  <div class="person-form__field">
    <label for="gender">Geschlecht</label>
    <p-select
      id="gender"
      [options]="genderOptions"
      [ngModel]="gender()"
      (ngModelChange)="gender.set($event)"
      optionLabel="label"
      optionValue="value"
      placeholder="Geschlecht auswählen"
      [disabled]="saving()"
    />
  </div>

  <div class="person-form__field">
    <label>Geburtsdatum</label>
    <app-fuzzy-date-picker [(value)]="birthDate" [disabled]="saving()" />
  </div>

  <div class="person-form__field">
    <label>Sterbedatum</label>
    <app-fuzzy-date-picker [(value)]="deathDate" [disabled]="saving()" />
  </div>

  <app-accordion label="Weitere Details">
    <div class="person-form__field">
      <label for="title">Titel</label>
      <input
        id="title"
        pInputText
        [ngModel]="title()"
        (ngModelChange)="title.set($event)"
        [disabled]="saving()"
      />
    </div>

    <div class="person-form__field">
      <label for="birthName">Geburtsname</label>
      <input
        id="birthName"
        pInputText
        [ngModel]="birthName()"
        (ngModelChange)="birthName.set($event)"
        [disabled]="saving()"
      />
    </div>

    <div class="person-form__field">
      <label for="middleNames">Weitere Vornamen</label>
      <input
        id="middleNames"
        pInputText
        [ngModel]="middleNames()"
        (ngModelChange)="middleNames.set($event)"
        [disabled]="saving()"
      />
    </div>

    <div class="person-form__field">
      <label for="birthPlace">Geburtsort</label>
      <input
        id="birthPlace"
        pInputText
        [ngModel]="birthPlace()"
        (ngModelChange)="birthPlace.set($event)"
        [disabled]="saving()"
      />
    </div>

    <div class="person-form__field">
      <label for="deathPlace">Sterbeort</label>
      <input
        id="deathPlace"
        pInputText
        [ngModel]="deathPlace()"
        (ngModelChange)="deathPlace.set($event)"
        [disabled]="saving()"
      />
    </div>

    <div class="person-form__field">
      <label for="burialPlace">Bestattungsort</label>
      <input
        id="burialPlace"
        pInputText
        [ngModel]="burialPlace()"
        (ngModelChange)="burialPlace.set($event)"
        [disabled]="saving()"
      />
    </div>

    <div class="person-form__field">
      <label for="religion">Religion</label>
      <p-select
        id="religion"
        [options]="religionOptions"
        [ngModel]="religion()"
        (ngModelChange)="religion.set($event)"
        [editable]="true"
        placeholder="Religion auswählen oder eingeben"
        [disabled]="saving()"
      />
    </div>
  </app-accordion>

  <div class="person-form__field">
    <label for="notes">Notizen</label>
    <textarea
      id="notes"
      pTextarea
      rows="4"
      [ngModel]="notes()"
      (ngModelChange)="notes.set($event)"
      [disabled]="saving()"
    ></textarea>
  </div>

</div>

<div class="person-form__actions">
  <p-divider />
  <div class="person-form__actions-buttons">
    <p-button [label]="personId() ? 'Speichern' : 'Erstellen'" [disabled]="!isValid || saving()" [loading]="saving()" (click)="onSubmit()" />
    <p-button label="Abbrechen" severity="secondary" [outlined]="true" [disabled]="saving()" (click)="onCancel()" />
  </div>
</div>
