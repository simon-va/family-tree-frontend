<div class="residence-form">
  <p-button label="Auf Karte auswählen" icon="pi pi-map" [outlined]="true" severity="secondary" (onClick)="openMapDialog()" />

  <div class="residence-form__field">
    <label for="street">Straße</label>
    <input
      id="street"
      pInputText
      [ngModel]="street()"
      (ngModelChange)="street.set($event)"
      [disabled]="saving()"
    />
  </div>

  <div class="residence-form__field">
    <label for="city">Stadt</label>
    <input
      id="city"
      pInputText
      [ngModel]="city()"
      (ngModelChange)="city.set($event)"
      [disabled]="saving()"
    />
  </div>

  <div class="residence-form__field">
    <label for="country">Land</label>
    <p-select
      id="country"
      [options]="countryOptions"
      [ngModel]="country()"
      (ngModelChange)="country.set($event)"
      [editable]="true"
      placeholder="Land auswählen oder eingeben"
      [disabled]="saving()"
      appendTo="body"
    />
  </div>

  <app-accordion label="Weitere Details">
    <div class="residence-form__field">
      <label>Startdatum</label>
      <app-fuzzy-date-picker [(value)]="startDate" [disabled]="saving()" />
    </div>

    <div class="residence-form__field">
      <label>Enddatum</label>
      <app-fuzzy-date-picker [(value)]="endDate" [disabled]="saving()" />
    </div>

    <div class="residence-form__row">
      <div class="residence-form__field">
        <label for="lat">Breitengrad (Lat)</label>
        <input
          id="lat"
          pInputText
          type="number"
          step="any"
          [ngModel]="lat()"
          (ngModelChange)="lat.set($event !== '' && $event != null ? +$event : null)"
          [disabled]="saving()"
        />
      </div>
      <div class="residence-form__field">
        <label for="lng">Längengrad (Lng)</label>
        <input
          id="lng"
          pInputText
          type="number"
          step="any"
          [ngModel]="lng()"
          (ngModelChange)="lng.set($event !== '' && $event != null ? +$event : null)"
          [disabled]="saving()"
        />
      </div>
    </div>

  </app-accordion>

  <div class="residence-form__field">
    <label for="notes">Notizen</label>
    <textarea
      id="notes"
      pTextarea
      rows="4"
      [ngModel]="notes()"
      (ngModelChange)="notes.set($event)"
      [disabled]="saving()"
    ></textarea>
  </div>
</div>

<div class="residence-form__actions">
  <p-divider />
  <div class="residence-form__actions-buttons">
    <p-button
      [label]="residenceId() ? 'Speichern' : 'Erstellen'"
      [disabled]="!isValid || saving()"
      [loading]="saving()"
      (click)="onSubmit()"
    />
    <p-button label="Abbrechen" severity="secondary" [outlined]="true" [disabled]="saving()" (click)="onCancel()" />
  </div>
</div>

<app-residence-map-dialog [(visible)]="showMapDialog" (coordsSelected)="onMapCoordsSelected($event)" />
