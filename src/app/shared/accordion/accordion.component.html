<div class="accordion">
  <div class="accordion__toggle" (click)="isOpen.set(!isOpen())">
    <span>{{ label() }}</span>
    <i [class]="isOpen() ? 'pi pi-chevron-up' : 'pi pi-chevron-down'"></i>
  </div>
  <div class="accordion__content" [class.is-open]="isOpen()">
    <div class="accordion__fields">
      <ng-content />
    </div>
  </div>
</div>
